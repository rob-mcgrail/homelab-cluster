- id: record_event_clips
  alias: "Record HD clips — all cams on any person/vehicle detection"
  description: >-
    On any AI-classified person/vehicle alert from ANY cam, fire a
    60s ffmpeg record on ALL cams. Cross-triggering is latency
    insurance: by the time we react to a single cam's AI firing
    (detect ~200ms + webhook ~100ms + HA dispatch ~100ms +
    ffmpeg first-I-frame ~1s ≈ 1.5s), a fast target (runner, car) can
    already be in another cam's FOV but not yet have triggered its
    own AI. Anchoring all recordings to the first detection captures
    every perspective without paying the other cams' detection-stack
    latency on top.
    mode:single + 45s delay = ONE combined event lock — a follow-up
    trigger from any cam within 45s is dropped because clips are
    already in flight.
    Daytime gate is the manual `input_boolean.skip_daytime_recordings`
    toggle — when on (default), clips are skipped 7am–7pm. Replaced
    the auto presence check (binary_sensor.rob_home) because HA is
    LAN-only and the Companion app can't push presence from cellular,
    so the auto check stayed stuck on "home" all day and ate every
    away-during-the-day event. The manual toggle puts the user in
    control; flip it off via either dashboard before going out for
    the day. Re-introduce auto-presence once HA is externally
    reachable (Cloudflare Tunnel planned).
    Triggers:
    - person — all cams, instant
    - vehicle — front_door only (the only cam with line-of-sight to
      the driveway). Deck + shed vehicle classifiers misfire on the
      dog: a 14-day audit showed dk_vehicle fired 1122 times overnight
      and was the first trigger on 574 of 580 overnight recordings.
      Same untrusted-sensor exclusion as floodlights_on_when_either_cam_detects.
    - NOT animal — too many false positives from possums/cats at
      night clogging up the clip list
    - NOT motion — that channel is dominated by shadows/wind/etc and
      would record constantly
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.front_door_floodlight_cam_person
        - binary_sensor.front_door_floodlight_cam_vehicle
        - binary_sensor.deck_floodlight_cam_person
        - binary_sensor.shed_person
      to: "on"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.skip_daytime_recordings
          state: "off"
        - condition: time
          after: "19:00:00"
          before: "07:00:00"
  action:
    # All shell_commands are detached (sh -c '...&'), so each returns
    # ~immediately and all ffmpegs run in parallel under PID 1
    # reparenting. Sequential calls here are effectively simultaneous.
    - service: shell_command.record_front_door
    - service: shell_command.record_deck
    - service: shell_command.record_shed
    # Push notification to every subscribed dashboard browser. Same
    # 45s debounce applies because the rest_command runs inside the
    # automation lock.
    - service: rest_command.dashboard_notify
      data:
        title: "Someone or something is outside"
        url: "/#floodlights"
        tag: "cam-event"
    # Hold the automation "running" so any further triggers in this
    # window are dropped — both clips are already being captured.
    - delay: "00:00:45"

- id: bootstrap_floodlights_auto
  alias: "Bootstrap: default floodlights_auto to on"
  description: >-
    First-boot helper. Turns the auto toggle on iff it's still in its
    "never been set" state. After it's been set once (by user or this
    automation), this never fires again because the toggle is on/off,
    not unknown.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.floodlights_auto
      state: unknown
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.floodlights_auto

- id: bootstrap_skip_daytime_recordings
  alias: "Bootstrap: default skip_daytime_recordings to on"
  description: >-
    Same first-boot helper for the skip-daytime toggle — `on` is the
    sensible default (don't fill disk with clips of yourself moving
    around during the day). User flips it off via the dashboard
    before leaving for the day.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.skip_daytime_recordings
      state: unknown
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.skip_daytime_recordings

- id: floodlights_on_when_either_cam_detects
  alias: "Floodlights: turn on when any cam detects person/vehicle"
  description: >-
    Any Reolink cam sees a human or vehicle → all floodlights on.
    Skipped during daylight and when the auto toggle is off.
    Trigger shape:
    - front_door person: instant (security-critical, want no delay at
      the doorbell zone)
    - deck + shed person: 500ms sustained. The dog gets briefly
      misclassified as person on these cams — observed pulses were
      ~0.2s before reverting to animal. A 500ms debounce filters those
      without meaningfully delaying real humans (real person events
      sustain for 3+ seconds).
    - front_door vehicle: 1500ms sustained (reolink AI flickers
      vehicle on/off as cars approach; sustain confirms real arrival).
    - deck + shed vehicle: excluded entirely — both classifiers
      misfire on animals (14-day overnight audit: dk_vehicle fired
      1122 times). Same exclusion as record_event_clips.
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.front_door_floodlight_cam_person
      to: "on"
    - platform: state
      entity_id:
        - binary_sensor.deck_floodlight_cam_person
        - binary_sensor.shed_person
      to: "on"
      for:
        milliseconds: 500
    - platform: state
      entity_id:
        - binary_sensor.front_door_floodlight_cam_vehicle
      to: "on"
      for:
        milliseconds: 1500
  condition:
    # Only fire after sundown — daylight floodlights are wasted electricity.
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    # And only when the user hasn't disabled the whole thing.
    - condition: state
      entity_id: input_boolean.floodlights_auto
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id:
          - light.front_door_floodlight_cam_floodlight
          - light.deck_floodlight_cam_floodlight
          - light.shed_floodlight

- id: floodlights_off_after_quiet_period
  alias: "Floodlights: turn off after 2 min of no detection"
  description: >-
    All floodlights off once ALL trusted detection sensors have been
    off for 2 minutes uninterrupted. Any new alert from any camera
    resets the timer (so successive detections extend the window).
    Gated on the auto toggle — if you disable auto mid-event, the
    lights stay on for you to control manually. Mirrors the trusted-
    signal set used by the on-automation: every cam's person sensor
    plus front_door vehicle. Deck + shed vehicle are excluded because
    they're treated as untrusted (animal misclassifications) — their
    OFF state shouldn't gate anything.
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.front_door_floodlight_cam_person
        - binary_sensor.front_door_floodlight_cam_vehicle
        - binary_sensor.deck_floodlight_cam_person
        - binary_sensor.shed_person
      to: "off"
      for:
        minutes: 2
  condition:
    # Only fire when ALL trusted sensors are currently off — otherwise
    # a quiet 2 minutes on Front while Deck is still seeing someone
    # would kill the lights mid-event.
    - condition: state
      entity_id: binary_sensor.front_door_floodlight_cam_person
      state: "off"
    - condition: state
      entity_id: binary_sensor.front_door_floodlight_cam_vehicle
      state: "off"
    - condition: state
      entity_id: binary_sensor.deck_floodlight_cam_person
      state: "off"
    - condition: state
      entity_id: binary_sensor.shed_person
      state: "off"
    # If the user turned the auto toggle off, leave the lights as they
    # are — they probably wanted manual control.
    - condition: state
      entity_id: input_boolean.floodlights_auto
      state: "on"
  action:
    - service: light.turn_off
      target:
        entity_id:
          - light.front_door_floodlight_cam_floodlight
          - light.deck_floodlight_cam_floodlight
          - light.shed_floodlight
